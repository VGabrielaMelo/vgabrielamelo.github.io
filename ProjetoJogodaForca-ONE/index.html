<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca | ONE</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="img/logo_alura.png">
</head>
<body>
    <main class="container">
        <!-- Menu inicial -->
        <div class="game-card" id="inicio">
            <div class="header">
                <div class="icon-wrapper">
                    <i class="fas fa-gamepad"></i>
                </div>
                <h1>Jogo da Forca</h1>
                <p class="subtitle">Teste seus conhecimentos e adivinhe as palavras!</p>
            </div>

            <div class="menu-buttons">
                <button class="btn-primary" id="btnIniciarJogo">
                    <i class="fas fa-play"></i> Iniciar Novo Jogo
                </button>
                <button class="btn-secondary" id="btnAddPalavra">
                    <i class="fas fa-plus"></i> Adicionar Nova Palavra
                </button>
                <button class="btn-secondary" id="btnVerPalavras">
                    <i class="fas fa-list"></i> Ver Palavras Cadastradas
                </button>
            </div>
        </div>

        <!-- Tela do Jogo -->
        <div class="game-card ocultarSection" id="jogo">
            <div class="game-header">
                <button class="btn-back" id="btnDesistirGame">
                    <i class="fas fa-arrow-left"></i> Sair
                </button>
                <h2><i class="fas fa-skull"></i> Jogo da Forca</h2>
                <button class="btn-reset" id="btnNovoJogoGame">
                    <i class="fas fa-sync-alt"></i> Novo Jogo
                </button>
            </div>

            <div class="game-area">
                <div class="canvas-area">
                    <canvas id="canvas-forca" width="350" height="360"></canvas>
                </div>
                <div class="word-area">
                    <div id="contPalavraSecreta" class="word-display"></div>
                    <div id="contLetrasUsadas" class="used-letters"></div>
                </div>
            </div>

            <!-- Teclado -->
            <div class="keyboard">
                <div class="keyboard-grid"></div>
            </div>
        </div>

        <!-- Adicionar Palavra -->
        <div class="game-card ocultarSection" id="vistapalavra">
            <div class="header">
                <div class="icon-wrapper">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <h2>Adicionar Nova Palavra</h2>
                <p class="subtitle">Máximo 15 e mínimo 3 caracteres (sem acentos)</p>
            </div>

            <div class="add-word-area">
                <input type="text" id="palavra" placeholder="Digite a palavra aqui" maxlength="15" autocomplete="off">
                <div class="add-buttons">
                    <button class="btn-primary" id="btnAdd">
                        <i class="fas fa-save"></i> Adicionar
                    </button>
                    <button class="btn-secondary" id="btnVoltar">
                        <i class="fas fa-arrow-left"></i> Voltar
                    </button>
                </div>
            </div>
        </div>

        <!-- Modal de Mensagem do Jogo -->
        <div class="modal ocultarSection" id="mensagemJogo">
            <div class="modal-content">
                <div class="modal-icon">
                    <i class="fas fa-info-circle"></i>
                </div>
                <p id="containerJanelaFlutuante">Mensagem</p>
                <button class="btn-primary" id="btnAceitar">Ok</button>
            </div>
        </div>

        <!-- Modal de Palavras Cadastradas -->
        <div class="modal ocultarSection" id="modalPalavras">
            <div class="modal-content modal-palavras">
                <div class="modal-icon">
                    <i class="fas fa-book"></i>
                </div>
                <h3>📚 Palavras Cadastradas</h3>
                <div id="listaPalavras" class="lista-palavras"></div>
                <button class="btn-primary" id="btnFecharPalavras">Fechar</button>
            </div>
        </div>
    </main>

    <script src="./script.js" defer></script>
</body>
</html>
