<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codificador | ONE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="./img/alura_logo.png">
</head>
<body>
    <main class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="icon-wrapper">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Codificador de Texto</h1>
                <p class="subtitle">Criptografe e descriptografe mensagens de forma segura</p>
            </div>

            <!-- Área principal com duas colunas -->
            <div class="codificador-area">
                <!-- Coluna da esquerda - Input -->
                <div class="input-area">
                    <textarea id="textUser" class="input-texto" placeholder="Digite seu texto aqui..." spellcheck="false"></textarea>
                        
                    <div class="info-message">
                        <i class="fas fa-info-circle"></i>
                        <span>Cifra de César, deslocamento de 3 posições. Apenas letras minúsculas (sem acentos) e espaços.</span>
                    </div>

                    <div class="button-group">
                        <button class="btn-primary" id="btnCriptografar">
                            <i class="fas fa-lock"></i> Criptografar
                        </button>
                        <button class="btn-secondary" id="btnDescriptografar">
                            <i class="fas fa-unlock-alt"></i> Descriptografar
                        </button>
                    </div>
                </div>

                <!-- Coluna da direita - Resultado -->
                <div class="output-area">
                    <div id="resultadoContainer" class="result-container">
                        <div id="emptyState" class="empty-state">
                            <div class="empty-icon">
                                <i class="fas fa-search"></i>
                            </div>
                            <strong>Nenhuma mensagem encontrada</strong>
                            <p>Digite um texto que você deseja criptografar ou descriptografar.</p>
                        </div>
                        <div id="resultContent" class="result-content hidden">
                            <textarea id="encriptado" class="result-textarea" readonly spellcheck="false"></textarea>
                            <button id="btnCopiar" class="btn-copy">
                                <i class="fas fa-copy"></i> Copiar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
